<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沈阳桁睿</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .card {
            background: #fff;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
        }
        @media (max-width: 600px) {
            body {
                padding: 2px;
            }
            .card {
                padding: 8px;
                border-radius: 8px;
                max-width: 98vw;
            }
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 12px;
                margin-bottom: 16px;
            }
            .status-bar {
                font-size: 12px;
                padding: 8px;
                margin-bottom: 12px;
            }
            .grid-container {
                gap: 8px;
                margin-bottom: 10px;
            }
            .switch-btn {
                padding: 8px 2px;
                font-size: 13px;
                border-radius: 8px;
                height: 48px;
            }
            .password-container {
                margin-top: 10px;
                padding-top: 10px;
            }
            .password-input {
                padding: 8px;
                font-size: 12px;
                border-radius: 8px;
            }
            .unlock-btn {
                padding: 8px;
                font-size: 13px;
                border-radius: 8px;
            }
        }
        h1 {
            color: #333;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }
        .status-bar {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .status-idle { background: #f0f0f0; color: #666; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }

        /* 6行1列布局 */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: repeat(6, auto);
            gap: 10px;
            margin-bottom: 20px;
        }

        /* 长方形按钮 */
        .switch-btn {
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            user-select: none;
            color: white;
            height: auto;
            min-height: 60px;
        }
        .switch-btn:active {
            transform: scale(0.98);
        }
        .switch-btn.off {
            background: linear-gradient(135deg, #9e9e9e 0%, #616161 100%) !important;
            opacity: 0.8;
        }
        .bg-1 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .bg-2 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .bg-3 { background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%); }
        .bg-4 { background: linear-gradient(135deg, #b3ffab 0%, #12fff7 100%); }
        .bg-5 { background: linear-gradient(135deg, #ff81c7 0%, #f5804f 100%); }
        .bg-6 { background: linear-gradient(135deg, #5433ff 0%, #20bdff 100%); }

        .state-text {
            font-size: 18px;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .password-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed #ddd;
        }
        .password-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
        }
        .unlock-btn {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>稳行无忧</h1>
        <p class="subtitle">请输入密码以解锁控制</p>

        <div id="status" class="status-bar status-idle">
            <i class="fas fa-info-circle"></i> 等待指令...
        </div>

        <!-- 初始隐藏：当前状态栏 -->
        <div id="recv" class="status-bar status-idle" style="margin-top:10px; display: none;">
            <i class="fas fa-download"></i> 未接收到消息
        </div>

        <div id="controlGrid" style="display: none;">
            <div class="grid-container">
                <div class="switch-btn bg-1 off" data-state="off" data-index="1" onclick="toggleSwitch(1)">
                    <span><i class="fas fa-power-off"></i> 剪式伸缩机构运行</span>
                    <div class="state-text">OFF</div>
                </div>
                <div class="switch-btn bg-2 off" data-state="off" data-index="2" onclick="toggleSwitch(2)">
                    <span><i class="fas fa-power-off"></i> 折叠渡板展开</span>
                    <div class="state-text">OFF</div>
                </div>
                <div class="switch-btn bg-3 off" data-state="off" data-index="3" onclick="toggleSwitch(3)">
                    <span><i class="fas fa-power-off"></i> 折叠渡板收回</span>
                    <div class="state-text">OFF</div>
                </div>
                <div class="switch-btn bg-4 off" data-state="off" data-index="4" onclick="toggleSwitch(4)">
                    <span><i class="fas fa-power-off"></i> 折叠渡板俯仰</span>
                    <div class="state-text">OFF</div>
                </div>
                <div class="switch-btn bg-5 off" data-state="off" data-index="5" onclick="toggleSwitch(5)">
                    <span><i class="fas fa-power-off"></i> 智能助力装置</span>
                    <div class="state-text">OFF</div>
                </div>
                <div class="switch-btn bg-6 off" data-state="off" data-index="6" onclick="toggleSwitch(6)">
                    <span><i class="fas fa-power-off"></i> 紧急停止</span>
                    <div class="state-text">OFF</div>
                </div>
            </div>
        </div>

        <div class="password-container" id="pwdContainer">
            <input type="password" id="pwdInput" class="password-input" placeholder="输入密码">
            <button class="unlock-btn" onclick="checkPassword()"><i class="fas fa-lock-open"></i> 解锁面板</button>
        </div>
    </div>

    <script>
        const PASSWORD = "syhr";
        const CONFIG = {
            uid: "6a51cf8f297040f9b8551ebee8020c1c",
            topic: "machine006",
            type: 1
        };

        // 解锁后才显示当前状态栏
        function checkPassword() {
            const input = document.getElementById('pwdInput').value;
            if (input === PASSWORD) {
                document.getElementById('pwdContainer').style.display = 'none';
                document.getElementById('controlGrid').style.display = 'block';
                document.getElementById('recv').style.display = 'block'; // ✅ 解锁后显示状态栏
                document.getElementById('status').innerHTML = "🔓 解锁成功！正在获取设备当前状态...";
                document.getElementById('status').className = 'status-bar status-success';
                pollUpdates();
            } else {
                alert("密码错误！");
            }
        }

        function toggleSwitch(index) {
            const btn = document.querySelector(`.switch-btn[data-index="${index}"]`);
            const stateText = btn.querySelector('.state-text');
            const currentState = btn.getAttribute('data-state');

            let cmd, desc;

            if (currentState === 'on') {
                btn.setAttribute('data-state', 'off');
                btn.classList.add('off');
                stateText.textContent = 'OFF';
                cmd = `M${index}_OFF`;
                desc = `模块${index}已关闭`;
            } else {
                btn.setAttribute('data-state', 'on');
                btn.classList.remove('off');
                stateText.textContent = 'ON';
                cmd = `M${index}_ON`;
                desc = `模块${index}已开启`;
            }
            sendCommand(cmd, desc);
        }

        async function sendCommand(msg, desc) {
            const statusEl = document.getElementById('status');
            statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> 正在发送${desc}指令...`;
            statusEl.className = 'status-bar status-idle';

            try {
                const response = await fetch('https://apis.bemfa.com/va/postJsonMsg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: CONFIG.uid,
                        topic: CONFIG.topic,
                        type: CONFIG.type,
                        msg: msg,
                        wemsg: desc
                    })
                });

                const result = await response.json();
                if (result.code === 0) {
                    statusEl.innerHTML = `<i class="fas fa-check"></i> ${desc}`;
                    statusEl.className = 'status-bar status-success';
                    pollUpdates();
                } else {
                    throw new Error(result.message || "发送失败");
                }
            } catch (error) {
                console.error(error);
                statusEl.innerHTML = `<i class="fas fa-times"></i> 发送失败`;
                statusEl.className = 'status-bar status-error';
            }
        }

        async function pollUpdates() {
            const recvEl = document.getElementById('recv');
            const requestUrl = `https://apis.bemfa.com/va/getmsg?uid=${CONFIG.uid}&type=${CONFIG.type}&topic=${CONFIG.topic}`;

            try {
                const response = await fetch(requestUrl, { method: 'GET' });
                const data = await response.json();

                if (data.code === 0 && data.data && data.data.length > 0) {
                    const realMsg = data.data[0].msg;
                    recvEl.innerHTML = `<i class="fas fa-info-circle"></i> 当前状态: ${realMsg}`;
                    recvEl.className = 'status-bar status-success';
                    syncLocalState(realMsg);
                } else {
                    recvEl.innerHTML = `<i class="fas fa-info-circle"></i> 当前状态: 无数据`;
                    recvEl.className = 'status-bar status-idle';
                }
            } catch (err) {
                recvEl.innerHTML = `<i class="fas fa-times"></i> 状态获取中`;
                recvEl.className = 'status-bar status-error';
            }
        }

        function syncLocalState(msg) {
            const match = msg.match(/M(\d+)_(ON|OFF)/);
            if (match) {
                const index = match[1];
                const state = match[2];
                const btn = document.querySelector(`.switch-btn[data-index="${index}"]`);
                if (btn) {
                    btn.setAttribute('data-state', state.toLowerCase());
                    btn.querySelector('.state-text').textContent = state;
                    state === 'OFF' ? btn.classList.add('off') : btn.classList.remove('off');
                }
            }
        }

        setInterval(pollUpdates, 1000);
    </script>
</body>
</html>
